version: '3.8'
services:
  omnistock-daily-report:
    build: .
    container_name: omnistock-daily-report
    restart: unless-stopped
    volumes:
      # 将四大核心数据目录挂载出来，保证 L1/L2 缓存和用户记忆永久持久化
      - ./memory:/app/memory
      - ./agent_workspace:/app/agent_workspace
      - ./knowledge_base:/app/knowledge_base
      - ./embeddings:/app/embeddings
      - ./.env:/app/.env

  tg-bot:
    build: .
    container_name: omnistock-tg-bot
    restart: unless-stopped
    command: ["python", "tg_main.py"]
    volumes:
      - ./memory:/app/memory
      - ./agent_workspace:/app/agent_workspace
      - ./knowledge_base:/app/knowledge_base
      - ./embeddings:/app/embeddings
      - ./jobs:/app/jobs
      - ./.env:/app/.env
      - ./tg_main.py:/app/tg_main.py
    depends_on:
      - omnistock-daily-report
